<!DOCTYPE html>
<html lang="uk">

<body>
  <h2>Лабораторна робота №4 — Бібліотека сортування</h2>
  <p>Відкрийте консоль браузера (F12 → Console) для перегляду результатів.</p>

  <script src="sorting.js"></script>
  <script>
    
    // 1.2.3 — Нерозріджений масив, 100 елементів

    var denseArray = [
      57, 23, 89, 14, 76, 42, 95, 31, 68, 10,
      83, 47, 29, 61, 5,  78, 36, 92, 18, 54,
      70, 3,  85, 49, 26, 63, 11, 97, 38, 72,
      16, 58, 33, 81, 44, 67, 8,  90, 25, 52,
      74, 19, 86, 41, 64, 7,  93, 30, 55, 77,
      2,  69, 37, 84, 22, 48, 15, 71, 43, 99,
      28, 60, 9,  82, 46, 73, 17, 56, 34, 88,
      21, 65, 4,  91, 39, 66, 12, 79, 51, 96,
      27, 59, 6,  87, 45, 62, 20, 53, 75, 100,
      32, 80, 13, 94, 40, 50, 24, 35, 98, 1
    ];

    console.log("========================================");
    console.log("  НЕРОЗРІДЖЕНИЙ МАСИВ (100 елементів)  ");
    console.log("========================================");
    console.log("Вхідний масив: [" + denseArray.join(", ") + "]");

    console.log("\n--- Сортування за ЗРОСТАННЯМ ---");
    SortLib.bubbleSort(denseArray, true);
    SortLib.selectionSort(denseArray, true);
    SortLib.insertionSort(denseArray, true);
    SortLib.shellSort(denseArray, true);
    SortLib.quickSort(denseArray, true);

    console.log("\n--- Сортування за СПАДАННЯМ ---");
    SortLib.bubbleSort(denseArray, false);
    SortLib.selectionSort(denseArray, false);
    SortLib.insertionSort(denseArray, false);
    SortLib.shellSort(denseArray, false);
    SortLib.quickSort(denseArray, false);

    // 1.2.4 — Розріджений масив (з undefined), 100+ елементів

    var sparseArray = [
      57, 23, undefined, 14, 76, 42, 95, undefined, 68, 10,
      83, 47, 29, undefined, 5,  78, 36, 92, 18, undefined,
      70, 3,  85, 49, undefined, 63, 11, 97, 38, 72,
      16, 58, undefined, 81, 44, 67, 8,  90, undefined, 52,
      74, 19, 86, 41, undefined, 7,  93, 30, 55, 77,
      undefined, 69, 37, 84, 22, 48, undefined, 71, 43, 99,
      28, undefined, 9,  82, 46, 73, 17, undefined, 34, 88,
      21, 65, undefined, 91, 39, 66, 12, 79, 51, undefined,
      27, 59, 6,  undefined, 45, 62, 20, 53, undefined, 100,
      32, 80, undefined, 94, 40, 50, 24, undefined, 98, 1
    ];

    console.log("\n========================================");
    console.log("  РОЗРІДЖЕНИЙ МАСИВ (з undefined)       ");
    console.log("========================================");

    console.log("\n--- Сортування за ЗРОСТАННЯМ ---");
    SortLib.bubbleSort(sparseArray, true);
    SortLib.selectionSort(sparseArray, true);
    SortLib.insertionSort(sparseArray, true);
    SortLib.shellSort(sparseArray, true);
    SortLib.quickSort(sparseArray, true);

    console.log("\n--- Сортування за СПАДАННЯМ ---");
    SortLib.bubbleSort(sparseArray, false);
    SortLib.selectionSort(sparseArray, false);
    SortLib.insertionSort(sparseArray, false);
    SortLib.shellSort(sparseArray, false);
    SortLib.quickSort(sparseArray, false);
  </script>
