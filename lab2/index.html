<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Лабораторна робота №2</title>
</head>
<body>
  <h2>Лабораторна робота №2 — ООП у JavaScript</h2>
  <p>Відкрийте консоль браузера (F12 → Console) для перегляду результатів.</p>

  <script>
    
    // 1.2.3 — car1 через new Object()
    
    var car1 = new Object();
    car1.color = "red";
    car1.maxSpeed = 200;
    car1.driver = new Object();
    car1.driver.name = "Greshchuk Maksym"; // ← заміни на своє ім'я
    car1.driver.category = "C";
    car1.driver["personal limitations"] = "No driving at night";
    car1.tuning = true;
    car1["number of accidents"] = 0;

    console.log("=== car1 ===");
    console.log(car1);

    // 1.2.4 — car2 через літерал об'єкта

    var car2 = {
      color: "blue",
      maxSpeed: 180,
      driver: {
        name: "Greshchuk Maksym", // ← заміни на своє ім'я
        category: "B",
        "personal limitations": null
      },
      tuning: false,
      "number of accidents": 2
    };

    console.log("=== car2 ===");
    console.log(car2);

    // 1.2.5 — метод drive для car1

    car1.drive = function() {
      console.log("I am not driving at night");
    };

    console.log("=== car1.drive() ===");
    car1.drive();

    // 1.2.6 — метод drive для car2

    car2.drive = function() {
      console.log("I can drive anytime");
    };

    console.log("=== car2.drive() ===");
    car2.drive();

    // 1.2.7 — конструктор Truck (БЕЗ синтаксису ES6 class)

    function Truck(color, weight, avgSpeed, brand, model) {
      this.color    = color;
      this.weight   = weight;
      this.avgSpeed = avgSpeed;
      this.brand    = brand;
      this.model    = model;

      // 1.2.9 — метод trip всередині конструктора

      this.trip = function() {
        if (!this.driver) {
          console.log("No driver assigned");
          return;
        }
        var night = this.driver.nightDriving
          ? "drives at night"
          : "does not drive at night";
        console.log(
          "Driver " + this.driver.name + " " + night +
          " and has " + this.driver.experience + " years of experience"
        );
      };
    }

    // 1.2.8 — метод AssignDriver через prototype

    Truck.prototype.AssignDriver = function(name, nightDriving, experience) {
      this.driver = {
        name:         name,
        nightDriving: nightDriving,
        experience:   experience
      };
    };

    // 1.2.10 — два об'єкти Truck, демонстрація trip

    var truck1 = new Truck("green", 5000, 90.5, "Volvo", "FH16");
    var truck2 = new Truck("black", 8000, 80.0, "MAN",   "TGX");

    truck1.AssignDriver("Greshchuk Maksym", true,  10); // ← заміни на своє ім'я
    truck2.AssignDriver("Greshchuk Maksym", false,  5); // ← заміни на своє ім'я

    console.log("=== truck1.trip() ===");
    truck1.trip();

    console.log("=== truck2.trip() ===");
    truck2.trip();

    // Демонстрація trip без водія
    var truck3 = new Truck("white", 3000, 85, "DAF", "XF");
    console.log("=== truck3.trip() (без водія) ===");
    truck3.trip();

    // ES6 CLASSES (1.2.12 – 1.2.24)

    // 1.2.12–1.2.15 — клас Square

    class Square {
      constructor(a) {
        this.a = a;
      }

      static help() {
        console.log(
          "Square: a quadrilateral with 4 equal sides and 4 right angles (90°). " +
          "Perimeter = 4a. Area = a²."
        );
      }

      length() {
        console.log("Perimeter = " + 4 * this.a);
      }

      square() {
        console.log("Area = " + this.a ** 2);
      }

      info() {
        console.log("--- Square info ---");
        console.log("Sides: a = b = c = d = " + this.a);
        console.log("Angles: all = 90°");
        console.log("Perimeter = " + 4 * this.a);
        console.log("Area = " + this.a ** 2);
      }
    }

    // 1.2.16–1.2.17 — клас Rectangle (успадковує Square)

    class Rectangle extends Square {
      constructor(a, b) {
        super(a);
        this.b = b;
      }

      static help() {
        console.log(
          "Rectangle: a quadrilateral with 4 right angles and opposite sides equal. " +
          "Perimeter = 2(a+b). Area = a×b."
        );
      }

      length() {
        console.log("Perimeter = " + 2 * (this.a + this.b));
      }

      square() {
        console.log("Area = " + this.a * this.b);
      }

      info() {
        console.log("--- Rectangle info ---");
        console.log("Sides: a = c = " + this.a + ", b = d = " + this.b);
        console.log("Angles: all = 90°");
        console.log("Perimeter = " + 2 * (this.a + this.b));
        console.log("Area = " + this.a * this.b);
      }

      // 1.2.22 — ґеттери та сеттери для Rectangle
      // (Rectangle — той клас, від якого НЕ створювався Parallelogram)

      get sideA() { return this.a; }
      set sideA(val) { this.a = val; }

      get sideB() { return this.b; }
      set sideB(val) { this.b = val; }
    }

    // 1.2.18–1.2.19 — клас Rhombus (успадковує Square)
    
    class Rhombus extends Square {
      constructor(a, alpha, beta) {
        super(a);
        this.alpha = alpha; // тупий кут
        this.beta  = beta;  // гострий кут
      }

      static help() {
        console.log(
          "Rhombus: a quadrilateral with 4 equal sides, opposite angles equal, " +
          "adjacent angles supplementary. Area = a² × sin(alpha)."
        );
      }

      length() {
        console.log("Perimeter = " + 4 * this.a);
      }

      square() {
        var area = this.a ** 2 * Math.sin(this.alpha * Math.PI / 180);
        console.log("Area = " + area);
      }

      info() {
        var area = this.a ** 2 * Math.sin(this.alpha * Math.PI / 180);
        console.log("--- Rhombus info ---");
        console.log("Sides: all = " + this.a);
        console.log("Angles: alpha = " + this.alpha + "°, beta = " + this.beta + "°");
        console.log("Perimeter = " + 4 * this.a);
        console.log("Area = " + area);
      }
    }

    // 1.2.20–1.2.21 — клас Parallelogram (успадковує Rhombus)

    class Parallelogram extends Rhombus {
      constructor(a, b, alpha, beta) {
        super(a, alpha, beta);
        this.b = b;
      }

      static help() {
        console.log(
          "Parallelogram: a quadrilateral with opposite sides parallel and equal. " +
          "Perimeter = 2(a+b). Area = a × b × sin(alpha)."
        );
      }

      length() {
        console.log("Perimeter = " + 2 * (this.a + this.b));
      }

      square() {
        var area = this.a * this.b * Math.sin(this.alpha * Math.PI / 180);
        console.log("Area = " + area);
      }

      info() {
        var area = this.a * this.b * Math.sin(this.alpha * Math.PI / 180);
        console.log("--- Parallelogram info ---");
        console.log("Sides: a = c = " + this.a + ", b = d = " + this.b);
        console.log("Angles: alpha = " + this.alpha + "°, beta = " + this.beta + "°");
        console.log("Perimeter = " + 2 * (this.a + this.b));
        console.log("Area = " + area);
      }
    }

    // 1.2.23 — виклик статичного методу help для всіх класів

    console.log("=== Static help() ===");
    Square.help();
    Rectangle.help();
    Rhombus.help();
    Parallelogram.help();

    // 1.2.24 — по одному об'єкту кожного класу, виклик info()

    var sq = new Square(5);
    var re = new Rectangle(6, 4);
    var rh = new Rhombus(7, 120, 60);
    var pg = new Parallelogram(8, 5, 110, 70);

    sq.info();
    re.info();
    rh.info();
    pg.info();

    // Демонстрація ґеттерів/сеттерів Rectangle
    console.log("=== Rectangle getters/setters ===");
    console.log("sideA getter:", re.sideA);
    re.sideA = 10;
    console.log("sideA after setter:", re.sideA);

    // 1.2.25–1.2.26 — функція Triangular

    function Triangular({ a = 3, b = 4, c = 5 } = {}) {
      return { a, b, c };
    }

    var t1 = Triangular(); // значення за замовчуванням
    var t2 = Triangular({ a: 5, b: 12, c: 13 });
    var t3 = Triangular({ a: 8, b: 15, c: 17 });

    console.log("=== Triangular objects ===");
    console.log(t1);
    console.log(t2);
    console.log(t3);

    // 1.2.27–1.2.28 — функція PiMultiplier

    function PiMultiplier(factor) {
      return function() {
        return Math.PI * factor;
      };
    }

    var piTimes2      = PiMultiplier(2);
    var piTimes2div3  = PiMultiplier(2 / 3);
    var piDiv2        = PiMultiplier(0.5);

    console.log("=== PiMultiplier ===");
    console.log("π × 2 =",   piTimes2());
    console.log("π × 2/3 =", piTimes2div3());
    console.log("π / 2 =",   piDiv2());

    // 1.2.29–1.2.31 — функція Painter

    function Painter(color) {
      return function(obj) {
        if (obj && obj.type !== undefined) {
          console.log(color + " " + obj.type);
        } else {
          console.log("No 'type' property occurred!");
        }
      };
    }

    var PaintBlue   = Painter("blue");
    var PaintRed    = Painter("red");
    var PaintYellow = Painter("yellow");

    var testObj1 = { maxSpeed: 280, type: "Sportcar",  color: "magenta" };
    var testObj2 = { type: "Truck", "avg speed": 90,   "load capacity": 2400 };
    var testObj3 = { maxSpeed: 180, color: "purple",   isCar: true };

    console.log("=== Painter ===");
    console.log("--- PaintBlue ---");
    PaintBlue(testObj1);
    PaintBlue(testObj2);
    PaintBlue(testObj3);

    console.log("--- PaintRed ---");
    PaintRed(testObj1);
    PaintRed(testObj2);
    PaintRed(testObj3);

    console.log("--- PaintYellow ---");
    PaintYellow(testObj1);
    PaintYellow(testObj2);
    PaintYellow(testObj3);

  </script>
</body>
</html>
